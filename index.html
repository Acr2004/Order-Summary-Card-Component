<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" sizes="32x32" href="Images/favicon-32x32.png">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <title>Frontend Mentor | Order Summary Card Component</title>
    </head>

    <body>
        <div class="container">
            <div>
                <img id="image" src="Images/illustration-hero.svg" alt="Illustration">
            </div>

            <div class="content">
                <h2 id="main-text">Order Summary</h2>
                <p id="secondary-text">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
            </div>

            <div class="music-plan">
                <img id="music" src="Images/icon-music.svg">
                <div class="plan">
                    <p id="plan-main">Annual Plan</p>
                    <p id="plan-price">$59.99/year</p>
                </div>
                <a id="change" href="#">Change</a>
            </div>

            <button>Proceed to Payment</button>

            <h6>Cancel Order</h6>
        </div>
    </body>
</html>
